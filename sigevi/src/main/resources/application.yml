spring:
  application:
    name: sigevi

  datasource:
    url: jdbc:postgresql://localhost:5432/sigevi
    username: sigevi
    password: sigevi
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: 8080
  servlet:
    context-path: /api

sigevi:
  jwt:
    secret: ${JWT_SECRET:U2lnZXZpU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uTWluaW11bTMyQnl0ZXM=}
    expiration-ms: 86400000
  upload:
    directory: ${UPLOAD_DIR:./uploads}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    br.com.sigevi: INFO
    org.springframework.security: WARN
