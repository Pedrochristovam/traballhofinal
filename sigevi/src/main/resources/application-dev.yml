# Perfil para desenvolvimento SEM PostgreSQL (banco em memoria H2)
# Executar: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# Ou na IDE: Active profiles = dev

spring:
  datasource:
    url: jdbc:h2:mem:sigevi;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true

  flyway:
    enabled: false
